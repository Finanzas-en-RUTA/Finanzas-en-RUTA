  <rect x="225" y="160" width="95" height="16" rx="4" fill="#00C48C"/>
  <rect x="300" y="160" width="18" height="90" rx="4" fill="#00C48C"/>
  <rect x="225" y="234" width="95" height="16" rx="4" fill="#00C48C"/>
  <rect x="278" y="250" width="65" height="90" rx="4" fill="#00C48C"/>
  <!-- Tagline dots -->
  <circle cx="150" cy="390" r="6" fill="#00C48C"/>
  <circle cx="170" cy="390" r="6" fill="#00C48C" opacity="0.6"/>
