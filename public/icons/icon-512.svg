<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0F1923"/>
  <rect width="512" height="512" rx="80" fill="url(#grad)"/>
