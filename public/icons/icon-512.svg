  <!-- F letter -->
  <rect x="80" y="160" width="18" height="180" rx="4" fill="#E8F0F8"/>
  <rect x="80" y="160" width="110" height="18" rx="4" fill="#E8F0F8"/>
  <rect x="80" y="238" width="85" height="16" rx="4" fill="#E8F0F8"/>
